<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>توقيع الطلب</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 24px;
    width: 100%;
    max-width: 480px;
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 20px;
    color: #1a6ec7;
    margin-bottom: 6px;
  }
  .header .req-id {
    font-size: 13px;
    color: #666;
    direction: ltr;
  }
  .info-box {
    background: #f8faff;
    border: 1px solid #d0e4ff;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #333;
    line-height: 1.8;
  }
  .info-box span { font-weight: bold; color: #1a6ec7; }
  .sign-label {
    font-size: 14px;
    color: #444;
    margin-bottom: 10px;
    text-align: center;
  }
  canvas {
    border: 2px dashed #1a6ec7;
    border-radius: 10px;
    background: #fff;
    width: 100%;
    touch-action: none;
    cursor: crosshair;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:active { opacity: 0.8; }
  .btn-clear {
    background: #f0f0f0;
    color: #555;
  }
  .btn-submit {
    background: #1a6ec7;
    color: white;
  }
  .btn-submit:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 14px;
    min-height: 24px;
  }
  .status.success { color: #27ae60; font-weight: bold; }
  .status.error   { color: #e74c3c; }
  .status.loading { color: #888; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>✍️ توقيع الطلب</h1>
    <div class="req-id" id="reqId"></div>
  </div>

  <div class="info-box">
    <div>👤 <span id="empName">...</span></div>
    <div>📋 <span id="reqType">...</span></div>
  </div>

  <div class="sign-label">ارسم توقيعك بإصبعك أو الماوس:</div>
  <canvas id="sigCanvas" height="180"></canvas>

  <div class="btn-row">
    <button class="btn-clear" onclick="clearCanvas()">🗑 مسح</button>
    <button class="btn-submit" id="submitBtn" onclick="submitSignature()" disabled>✅ إرسال</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  // قراءة الـ URL params
  const params = new URLSearchParams(window.location.search);
  const token   = params.get('token') || '';
  const name    = params.get('name')  || '';
  const reqId   = params.get('req')   || '';
  const type    = params.get('type')  || '';

  const typeMap = {
    annual: 'إجازة سنوية',
    sick:   'إجازة مرضية',
    unpaid: 'إجازة بدون راتب',
  };

  document.getElementById('empName').textContent = decodeURIComponent(name.replace(/\+/g, ' '));
  document.getElementById('reqId').textContent   = 'رقم الطلب: ' + reqId;
  document.getElementById('reqType').textContent = typeMap[type] || type;

  // Canvas setup
  const canvas = document.getElementById('sigCanvas');
  const ctx    = canvas.getContext('2d');
  let drawing  = false;
  let hasSig   = false;

  function resizeCanvas() {
    const w = canvas.offsetWidth;
    canvas.width  = w;
    canvas.height = 180;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function draw(e) {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    hasSig = true;
    document.getElementById('submitBtn').disabled = false;
  }
  function endDraw(e) { e.preventDefault(); drawing = false; }

  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('mouseup',    endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove',  draw,      { passive: false });
  canvas.addEventListener('touchend',   endDraw,   { passive: false });

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('status').textContent = '';
    document.getElementById('status').className = 'status';
  }

  async function submitSignature() {
    if (!hasSig) return;
    const btn = document.getElementById('submitBtn');
    const sta = document.getElementById('status');
    btn.disabled = true;
    sta.textContent = '⏳ جاري الإرسال...';
    sta.className = 'status loading';

    const sigData = canvas.toDataURL('image/png');
    try {
      const res = await fetch('/sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, signature: sigData }),
      });
      if (res.ok) {
        sta.textContent = '✅ تم إرسال توقيعك بنجاح! يمكنك إغلاق هذه الصفحة.';
        sta.className = 'status success';
        canvas.style.pointerEvents = 'none';
      } else {
        throw new Error('Server error ' + res.status);
      }
    } catch (err) {
      sta.textContent = '❌ حدث خطأ. حاول مرة أخرى.';
      sta.className = 'status error';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
